<script type="text/plain" id="app-source">
const { useState, useRef, useCallback, useEffect } = React;

/* ---------- Ícones ---------- */

}

/* ---------- Dados e regras (inalterados) ---------- */

const UFS = [
  ["AC","Acre"],["AL","Alagoas"],["AP","Amapá"],["AM","Amazonas"],["BA","Bahia"],
  ["CE","Ceará"],["DF","Distrito Federal"],["ES","Espírito Santo"],["GO","Goiás"],
  ["MA","Maranhão"],["MT","Mato Grosso"],["MS","Mato Grosso do Sul"],["MG","Minas Gerais"],
  ["PA","Pará"],["PB","Paraíba"],["PR","Paraná"],["PE","Pernambuco"],["PI","Piauí"],
  ["RJ","Rio de Janeiro"],["RN","Rio Grande do Norte"],["RS","Rio Grande do Sul"],
  ["RO","Rondônia"],["RR","Roraima"],["SC","Santa Catarina"],["SP","São Paulo"],
  ["SE","Sergipe"],["TO","Tocantins"],
];

const REQUIRED_ORDER = ["nome", "cpf", "telefone", "email"];

const INITIAL_STATE = {
  nome: "", cpf: "", telefone: "", email: "",
  cep: "", logradouro: "", numero: "", complemento: "",
  bairro: "", cidade: "", estado: "",
};

function onlyDigits(v) { return v.replace(/\D/g, ""); }

function maskCPF(v) {
  const d = onlyDigits(v).slice(0, 11);
  return d
    .replace(/(\d{3})(\d)/, "$1.$2")
    .replace(/(\d{3})(\d)/, "$1.$2")
    .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
}

function maskTelefone(v) {
  const d = onlyDigits(v).slice(0, 11);
  if (d.length <= 10) {
    return d
      .replace(/(\d{2})(\d)/, "($1) $2")
      .replace(/(\d{4})(\d{1,4})$/, "$1-$2");
  }
  return d
    .replace(/(\d{2})(\d)/, "($1) $2")
    .replace(/(\d{5})(\d{1,4})$/, "$1-$2");
}

function maskCEP(v) {
  const d = onlyDigits(v).slice(0, 8);
  return d.replace(/(\d{5})(\d{1,3})$/, "$1-$2");
}

const CPF_RE = /^\d{3}\.\d{3}\.\d{3}-\d{2}$/;
const TEL_RE = /^\(\d{2}\) \d{4,5}-\d{4}$/;
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function validate(values) {
  const errors = {};
  if (!values.nome.trim()) errors.nome = "Informe o nome completo.";
  if (!values.cpf.trim()) errors.cpf = "Informe o CPF.";
  else if (!CPF_RE.test(values.cpf)) errors.cpf = "CPF inválido. Use o formato 000.000.000-00.";
  if (!values.telefone.trim()) errors.telefone = "Informe o telefone.";
  else if (!TEL_RE.test(values.telefone)) errors.telefone = "Telefone inválido. Use o formato (00) 00000-0000.";
  if (!values.email.trim()) errors.email = "Informe o e-mail.";
  else if (!EMAIL_RE.test(values.email)) errors.email = "E-mail inválido.";
  return errors;
}

function getInitials(nome) {
  const parts = nome.trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return "";
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

/* ---------- Componentes reutilizáveis ---------- */

function TextField({
  id, label, required, icon, mono, placeholder, type, inputMode, autoComplete,
  value, onChange, onBlur, error, touched, submitted, fieldRef,
}) {
  const showError = Boolean(error) && (touched || submitted);
  const showValid = required && !error && value.trim().length > 0;
  return (
    <div className={"flex flex-col gap-1.5" + (showError ? " shake" : "")}>
      <label htmlFor={id} className="text-[13px] font-medium text-slate-700 flex items-baseline gap-1">
        {label}
        {required && <span className="text-violet-600">*</span>}
      </label>
      <div className="relative">
        {icon && (
          <span className="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
            {icon}
          </span>
        )}
        <input
          id={id}
          ref={fieldRef}
          type={type || "text"}
          inputMode={inputMode}
          autoComplete={autoComplete}
          placeholder={placeholder}
          value={value}
          onChange={onChange}
          onBlur={onBlur}
          className={
            "w-full h-11 rounded-lg border bg-white text-[14.5px] text-slate-900 " +
            "placeholder:text-slate-400 outline-none transition-all duration-150 " +
            "hover:border-slate-300 focus:ring-4 " +
            (icon ? "pl-10 " : "pl-3.5 ") +
            (showValid ? "pr-10 " : "pr-3.5 ") +
            (mono ? "font-mono tracking-wide " : "") +
            (showError
              ? "border-red-400 focus:border-red-500 focus:ring-red-100"
              : "border-slate-200 focus:border-violet-500 focus:ring-violet-100")
          }
        />
        {showValid && (
          <span className="absolute right-3 top-1/2 -translate-y-1/2 text-emerald-500">
            <IconCheck className="w-4 h-4" />
          </span>
        )}
      </div>
      <p
        className={"text-xs font-medium min-h-[16px] " + (showError ? "text-red-600 opacity-100" : "opacity-0")}
        role={showError ? "alert" : undefined}
      >
        {showError ? error : " "}
      </p>
    </div>
  );
}

function SelectField({ id, label, value, onChange, options }) {
  return (
    <div className="flex flex-col gap-1.5">
      <label htmlFor={id} className="text-[13px] font-medium text-slate-700">{label}</label>
      <div className="relative">
        <select
          id={id}
          value={value}
          onChange={onChange}
          className="w-full h-11 rounded-lg border border-slate-200 bg-white pl-3.5 pr-9 text-[14.5px] text-slate-900 outline-none transition-all duration-150 hover:border-slate-300 focus:border-violet-500 focus:ring-4 focus:ring-violet-100 appearance-none cursor-pointer"
        >
          <option value="">Selecione</option>
          {options.map(([v, l]) => (
            <option key={v} value={v}>{v} — {l}</option>
          ))}
        </select>
        <IconChevronDown className="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
      </div>
      <p className="text-xs min-h-[16px]"> </p>
    </div>
  );
}

function SectionCard({ id, number, icon, title, description, sectionRef, children }) {
  return (
    <section
      id={id}
      ref={sectionRef}
      style={{ scrollMarginTop: "96px" }}
      className="bg-white rounded-2xl border border-slate-200 shadow-[0_1px_2px_rgba(15,23,42,0.04)] p-6 sm:p-8"
    >
      <div className="flex items-start gap-3.5 mb-6">
        <span className="flex items-center justify-center w-10 h-10 rounded-xl bg-violet-50 text-violet-600 shrink-0">
          {icon}
        </span>
        <div className="min-w-0">
          <div className="flex items-center gap-2">
            <span className="text-xs font-semibold text-violet-600">{String(number).padStart(2, "0")}</span>
            <h2 className="text-base font-semibold text-slate-900">{title}</h2>
          </div>
          <p className="text-sm text-slate-500 mt-0.5">{description}</p>
        </div>
      </div>
      <div className="flex flex-col gap-5">{children}</div>
    </section>
  );
}

function Stepper({ steps, active, onNavigate }) {
  return (
    <div className="flex flex-wrap gap-2 mt-5">
      {steps.map((s) => (
        <button
          key={s.id}
          type="button"
          onClick={() => onNavigate(s.id)}
          className={
            "flex items-center gap-2 rounded-full border px-3.5 py-1.5 text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-violet-300 focus-visible:ring-offset-2 " +
            (active === s.id
              ? "border-violet-600 bg-violet-600 text-white"
              : "border-slate-200 bg-white text-slate-600 hover:border-slate-300")
          }
        >
          <span
            className={
              "flex items-center justify-center w-5 h-5 rounded-full text-[11px] font-semibold " +
              (active === s.id ? "bg-white/20" : "bg-slate-100 text-slate-500")
            }
          >
            {s.number}
          </span>
          {s.label}
        </button>
      ))}
    </div>
  );
}

function SummaryRow({ icon, label, value }) {
  return (
    <div className="flex items-start gap-2.5 text-sm">
      <span className="text-slate-400 mt-0.5 shrink-0">{icon}</span>
      <div className="min-w-0">
        <p className="text-[11px] uppercase tracking-wide text-slate-400">{label}</p>
        <p className={"truncate " + (value ? "text-slate-800 font-medium" : "text-slate-300")}>
          {value || "Não informado"}
        </p>
      </div>
    </div>
  );
}

function Toast({ show, onClose }) {
  return (
    <div
      aria-live="polite"
      className={
        "fixed top-5 right-5 z-50 transition-all duration-300 " +
        (show ? "opacity-100 translate-y-0" : "opacity-0 -translate-y-2 pointer-events-none")
      }
    >
      <div className="flex items-start gap-3 rounded-xl border border-emerald-200 bg-white shadow-lg shadow-emerald-900/5 px-4 py-3.5 max-w-sm">
        <span className="flex items-center justify-center w-8 h-8 rounded-full bg-emerald-50 text-emerald-600 shrink-0">
          <IconCheck className="w-4 h-4" />
        </span>
        <div className="flex-1">
          <p className="text-sm font-semibold text-slate-900">Cliente cadastrado</p>
          <p className="text-xs text-slate-500 mt-0.5">Os dados foram validados com sucesso. Nenhuma informação foi enviada ou persistida.</p>
        </div>
        <button
          type="button"
          onClick={onClose}
          className="text-slate-400 hover:text-slate-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-violet-300 rounded"
          aria-label="Fechar notificação"
        >
          <IconX className="w-4 h-4" />
        </button>
      </div>
    </div>
  );
}

/* ---------- App ---------- */

const STEPS = [
  { id: "identificacao", number: 1, label: "Identificação" },
  { id: "contato", number: 2, label: "Contato" },
  { id: "endereco", number: 3, label: "Endereço" },
];

function App() {
  const [values, setValues] = useState(INITIAL_STATE);
  const [touched, setTouched] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [saving, setSaving] = useState(false);
  const [success, setSuccess] = useState(false);
  const [activeStep, setActiveStep] = useState("identificacao");

  const fieldRefs = useRef({});
  const sectionRefs = useRef({});

  const errors = validate(values);
  const hasErrors = Object.keys(errors).length > 0;

  useEffect(() => {
    const visible = new Set();
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) visible.add(entry.target.id);
          else visible.delete(entry.target.id);
        });
        const topmost = STEPS.find((s) => visible.has(s.id));
        if (topmost) setActiveStep(topmost.id);
      },
      { rootMargin: "-110px 0px -55% 0px", threshold: 0 }
    );
    Object.values(sectionRefs.current).forEach((el) => el && observer.observe(el));
    return () => observer.disconnect();
  }, []);

  useEffect(() => {
    if (!success) return;
    const t = setTimeout(() => setSuccess(false), 5000);
    return () => clearTimeout(t);
  }, [success]);

  const setField = useCallback((name, transform) => (e) => {
    const raw = e.target.value;
    const val = transform ? transform(raw) : raw;
    setValues((prev) => ({ ...prev, [name]: val }));
  }, []);

  const handleBlur = (name) => () => {
    setTouched((prev) => ({ ...prev, [name]: true }));
  };

  const goToStep = (id) => {
    setActiveStep(id);
    const node = sectionRefs.current[id];
    if (node) node.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  const handleSalvar = (e) => {
    e.preventDefault();
    if (saving) return;
    setSubmitted(true);
    setTouched(REQUIRED_ORDER.reduce((acc, k) => ({ ...acc, [k]: true }), {}));

    const currentErrors = validate(values);
    if (Object.keys(currentErrors).length > 0) {
      setSuccess(false);
      const firstInvalid = REQUIRED_ORDER.find((k) => currentErrors[k]);
      const node = fieldRefs.current[firstInvalid];
      if (node) {
        node.scrollIntoView({ behavior: "smooth", block: "center" });
        node.focus({ preventScroll: true });
      }
      return;
    }

    setSaving(true);
    setTimeout(() => {
      setSaving(false);
      setSuccess(true);
    }, 700);
  };

  const handleCancelar = () => {
    setValues(INITIAL_STATE);
    setTouched({});
    setSubmitted(false);
    setSaving(false);
    setSuccess(false);
    setActiveStep("identificacao");
  };

  const checklist = [
    { key: "nome", label: "Nome completo", done: !errors.nome },
    { key: "cpf", label: "CPF", done: !errors.cpf },
    { key: "telefone", label: "Telefone", done: !errors.telefone },
    { key: "email", label: "E-mail", done: !errors.email },
  ];
  const doneCount = checklist.filter((c) => c.done).length;
  const progressPct = (doneCount / checklist.length) * 100;

  const enderecoResumo = [values.cidade, values.estado].filter(Boolean).join(" - ");
  const initials = getInitials(values.nome);

  return (
    <React.Fragment>
      <header className="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200">
        <div className="max-w-[1200px] mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3 min-w-0">
            <div className="w-8 h-8 rounded-lg bg-violet-600 text-white flex items-center justify-center font-bold text-sm shrink-0">C</div>
            <div className="min-w-0">
              <p className="text-sm font-semibold text-slate-900 leading-tight truncate">Sistema de Clientes</p>
              <p className="hidden sm:block text-xs text-slate-400 leading-tight">Clientes <span className="mx-1">/</span> Novo cliente</p>
            </div>
          </div>
          <span className="hidden md:flex items-center gap-1.5 rounded-full bg-amber-50 border border-amber-200 px-3 py-1 text-xs font-medium text-amber-700 shrink-0">
            <span className="w-1.5 h-1.5 rounded-full bg-amber-500" />
            Ambiente de testes — dados não são salvos
          </span>
        </div>
      </header>

      <main className="max-w-[1200px] mx-auto px-4 sm:px-6 py-8 sm:py-10">
        <div>
          <h1 className="text-2xl sm:text-[28px] font-semibold text-slate-900 tracking-tight">Novo cliente</h1>
          <p className="text-sm text-slate-500 mt-1">Preencha as informações abaixo para cadastrar um novo cliente na base.</p>
        </div>

        <Stepper steps={STEPS} active={activeStep} onNavigate={goToStep} />

        <form onSubmit={handleSalvar} noValidate className="mt-7 grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-6 lg:gap-8 items-start">
          <div className="flex flex-col gap-6 min-w-0">
            {submitted && hasErrors && (
              <div className="flex items-center gap-3 rounded-xl border border-red-200 bg-red-50 px-4 py-3.5">
                <span className="text-red-500 shrink-0"><IconAlert className="w-5 h-5" /></span>
                <p className="text-sm text-red-700">
                  <span className="font-semibold">
                    {Object.keys(errors).length} {Object.keys(errors).length === 1 ? "campo precisa" : "campos precisam"}
                  </span>{" "}
                  de atenção antes de salvar.
                </p>
              </div>
            )}

            <SectionCard
              id="identificacao"
              number={1}
              icon={<IconUser className="w-5 h-5" />}
              title="Identificação"
              description="Dados básicos para identificar o cliente."
              sectionRef={(el) => (sectionRefs.current.identificacao = el)}
            >
              <TextField
                id="nome"
                label="Nome Completo"
                required
                icon={<IconUser className="w-[18px] h-[18px]" />}
                autoComplete="name"
                placeholder="Ex: Maria da Silva Santos"
                value={values.nome}
                onChange={setField("nome")}
                onBlur={handleBlur("nome")}
                error={errors.nome}
                touched={touched.nome}
                submitted={submitted}
                fieldRef={(el) => (fieldRefs.current.nome = el)}
              />
              <TextField
                id="cpf"
                label="CPF"
                required
                mono
                icon={<IconIdCard className="w-[18px] h-[18px]" />}
                inputMode="numeric"
                placeholder="000.000.000-00"
                value={values.cpf}
                onChange={setField("cpf", maskCPF)}
                onBlur={handleBlur("cpf")}
                error={errors.cpf}
                touched={touched.cpf}
                submitted={submitted}
                fieldRef={(el) => (fieldRefs.current.cpf = el)}
              />
            </SectionCard>

            <SectionCard
              id="contato"
              number={2}
              icon={<IconPhone className="w-5 h-5" />}
              title="Contato"
              description="Como o cliente pode ser contatado."
              sectionRef={(el) => (sectionRefs.current.contato = el)}
            >
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <TextField
                  id="telefone"
                  label="Telefone"
                  required
                  mono
                  icon={<IconPhone className="w-[18px] h-[18px]" />}
                  inputMode="numeric"
                  autoComplete="tel"
                  placeholder="(00) 00000-0000"
                  value={values.telefone}
                  onChange={setField("telefone", maskTelefone)}
                  onBlur={handleBlur("telefone")}
                  error={errors.telefone}
                  touched={touched.telefone}
                  submitted={submitted}
                  fieldRef={(el) => (fieldRefs.current.telefone = el)}
                />
                <TextField
                  id="email"
                  label="E-mail"
                  required
                  type="email"
                  icon={<IconMail className="w-[18px] h-[18px]" />}
                  autoComplete="email"
                  placeholder="nome@exemplo.com"
                  value={values.email}
                  onChange={setField("email")}
                  onBlur={handleBlur("email")}
                  error={errors.email}
                  touched={touched.email}
                  submitted={submitted}
                  fieldRef={(el) => (fieldRefs.current.email = el)}
                />
              </div>
            </SectionCard>

            <SectionCard
              id="endereco"
              number={3}
              icon={<IconMapPin className="w-5 h-5" />}
              title="Endereço"
              description="Localização do cliente (opcional)."
              sectionRef={(el) => (sectionRefs.current.endereco = el)}
            >
              <div className="grid grid-cols-1 sm:grid-cols-[7rem_1fr_7rem] gap-5">
                <TextField
                  id="cep" label="CEP" mono inputMode="numeric" placeholder="00000-000"
                  value={values.cep} onChange={setField("cep", maskCEP)}
                />
                <TextField
                  id="logradouro" label="Logradouro" placeholder="Rua, Avenida..."
                  value={values.logradouro} onChange={setField("logradouro")}
                />
                <TextField
                  id="numero" label="Número" placeholder="123"
                  value={values.numero} onChange={setField("numero")}
                />
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <TextField
                  id="complemento" label="Complemento" placeholder="Apto, bloco, referência..."
                  value={values.complemento} onChange={setField("complemento")}
                />
                <TextField
                  id="bairro" label="Bairro" placeholder="Ex: Centro"
                  value={values.bairro} onChange={setField("bairro")}
                />
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-[1fr_10rem] gap-5">
                <TextField
                  id="cidade" label="Cidade" placeholder="Ex: São Paulo"
                  value={values.cidade} onChange={setField("cidade")}
                />
                <SelectField
                  id="estado" label="Estado" value={values.estado}
                  onChange={setField("estado")} options={UFS}
                />
              </div>
            </SectionCard>
          </div>

          <aside className="lg:sticky lg:top-24">
            <div className="bg-white rounded-2xl border border-slate-200 shadow-[0_1px_2px_rgba(15,23,42,0.04)] p-6 flex flex-col gap-5">
              <div className="flex items-center gap-3">
                <div className="w-14 h-14 rounded-full bg-violet-600 text-white flex items-center justify-center text-lg font-semibold shrink-0">
                  {initials || <IconUser className="w-6 h-6" />}
                </div>
                <div className="min-w-0">
                  <p className="text-sm font-semibold text-slate-900 truncate">{values.nome.trim() || "Novo cliente"}</p>
                  <p className="text-xs text-slate-400">Pré-visualização do cadastro</p>
                </div>
              </div>

              <div className="h-px bg-slate-100" />

              <div className="flex flex-col gap-3.5">
                <SummaryRow icon={<IconIdCard className="w-4 h-4" />} label="CPF" value={values.cpf} />
                <SummaryRow icon={<IconPhone className="w-4 h-4" />} label="Telefone" value={values.telefone} />
                <SummaryRow icon={<IconMail className="w-4 h-4" />} label="E-mail" value={values.email} />
                <SummaryRow icon={<IconMapPin className="w-4 h-4" />} label="Endereço" value={enderecoResumo} />
              </div>

              <div className="h-px bg-slate-100" />

              <div>
                <div className="flex items-center justify-between mb-2">
                  <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Campos obrigatórios</p>
                  <p className="text-xs text-slate-400">{doneCount}/{checklist.length}</p>
                </div>
                <div className="h-1.5 rounded-full bg-slate-100 overflow-hidden mb-3">
                  <div
                    className="h-full bg-violet-600 transition-all duration-300"
                    style={{ width: progressPct + "%" }}
                  />
                </div>
                <ul className="flex flex-col gap-1.5">
                  {checklist.map((c) => (
                    <li key={c.key} className="flex items-center gap-2 text-sm">
                      <span
                        className={
                          "flex items-center justify-center w-4 h-4 rounded-full shrink-0 " +
                          (c.done ? "bg-emerald-500 text-white" : "border border-slate-300")
                        }
                      >
                        {c.done && <IconCheck className="w-2.5 h-2.5" />}
                      </span>
                      <span className={c.done ? "text-slate-700 font-medium" : "text-slate-500"}>{c.label}</span>
                    </li>
                  ))}
                </ul>
              </div>

              <div className="h-px bg-slate-100" />

              <div className="flex flex-col gap-2.5">
                <button
                  type="submit"
                  disabled={saving}
                  className="w-full h-11 rounded-lg font-semibold text-sm text-white bg-violet-600 hover:bg-violet-700 active:bg-violet-800 disabled:opacity-70 disabled:cursor-not-allowed shadow-sm shadow-violet-600/20 transition-colors flex items-center justify-center gap-2 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-violet-300 focus-visible:ring-offset-2"
                >
                  {saving ? (
                    <React.Fragment>
                      <IconSpinner className="w-4 h-4 animate-spin" />
                      Salvando...
                    </React.Fragment>
                  ) : (
                    "Salvar Cliente"
                  )}
                </button>
                <button
                  type="button"
                  onClick={handleCancelar}
                  disabled={saving}
                  className="w-full h-11 rounded-lg font-medium text-sm text-slate-600 border border-slate-200 bg-white hover:bg-slate-50 active:bg-slate-100 disabled:opacity-60 disabled:cursor-not-allowed transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-violet-300 focus-visible:ring-offset-2"
                >
                  Cancelar
                </button>
              </div>

              <p className="text-[11px] text-slate-400 text-center leading-relaxed">
                Formulário apenas para demonstração. Nenhum dado é enviado a um servidor.
              </p>
            </div>
          </aside>
        </form>
      </main>

      <Toast show={success} onClose={() => setSuccess(false)} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  var runnable = document.createElement("script");
  runnable.textContent = compiled;
  document.body.appendChild(runnable);
</script>
</body>
</html>
